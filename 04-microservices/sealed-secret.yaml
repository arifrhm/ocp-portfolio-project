# ---------------------------------------------------------------------------------------------------------
# PORTFOLIO DEMONSTRATION NOTE:
# This file demonstrates GitOps security using Bitnami Sealed Secrets.
#
# DO NOT store plain-text Secrets (like below) in Git:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: db-credentials
# stringData:
#   username: admin
#   password: SuperSecretPassword123!
#
# INSTEAD: 
# The plain-text secret is encrypted locally using the `kubeseal` CLI with the cluster's public key.
# The resulting `SealedSecret` object (like the one below) is completely safe to commit to public Git repos.
# ArgoCD applies this file to the cluster, where the Sealed Secrets Controller decrypts it securely.
# ---------------------------------------------------------------------------------------------------------

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: db-credentials
  namespace: development
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
spec:
  encryptedData:
    username: AgANW3gXk1o... (This is a mock encrypted string for demonstration)
    password: AgBlK4sTf9p... (This is a mock encrypted string for demonstration)
  template:
    metadata:
      name: db-credentials
      labels:
        app: demo-microservice
    type: Opaque
