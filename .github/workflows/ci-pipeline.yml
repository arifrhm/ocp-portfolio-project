name: CI Pipeline (Build & Test)

on:
  push:
    branches: [ "main" ]
    paths:
      - '04-microservices/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '04-microservices/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./04-microservices

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x

    - name: Install dependencies
      run: npm install

    - name: Build Docker Image
      run: docker build -t demo-microservice:${{ github.sha }} .

    # To enable pushing to a registry (e.g. Docker Hub or GHCR), configure secrets in GitHub and uncomment:
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}
