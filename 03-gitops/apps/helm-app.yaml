apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-demo-microservice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/arifrhm/ocp-portfolio-project.git'
    path: '05-helm-chart/demo-microservice'
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
