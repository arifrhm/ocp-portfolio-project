apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-microservice
  namespace: argocd
spec:
  project: default
  source:
    # IMPORTANT: Change this URL to your own GitHub repository after pushing!
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/ocp-portfolio-project.git'
    path: '04-microservices'
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
