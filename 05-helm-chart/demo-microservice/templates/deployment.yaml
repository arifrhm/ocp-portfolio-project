apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-microservice.fullname" . | default .Chart.Name }}
  labels:
    app: {{ include "demo-microservice.fullname" . | default .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "demo-microservice.fullname" . | default .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ include "demo-microservice.fullname" . | default .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
