apiVersion: v1
kind: Service
metadata:
  name: {{ include "demo-microservice.fullname" . | default .Chart.Name }}-svc
  labels:
    app: {{ include "demo-microservice.fullname" . | default .Chart.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "demo-microservice.fullname" . | default .Chart.Name }}
